<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ถึงอ้วน 🤍</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ฉากหลังซากุระร่วง -->
    <div class="sakura-bg">
        <span>🌸</span><span>🌺</span><span>✨</span><span>🌸</span><span>💖</span>
        <span>🌸</span><span>🌺</span><span>✨</span><span>🌸</span><span>💖</span>
    </div>

    <input type="checkbox" id="toggle-letter">

    <div class="wrapper">
        <label for="toggle-letter" class="container" id="letterLabel">
            <div class="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="stamp">
                    <span class="stamp-icon">💖</span>
                </div>

                <div class="letter">
                    <div class="letter-inner">
                        <!-- 🖼️ โค้ดดึงรูป profile.jpg ที่คุณอัปโหลดขึ้นไป -->
                        <div class="photo-frame">
                            <img src="profile.jpeg" alt="Our Memory">
                        </div>

                        <h2>ถึงอ้วน 🤍</h2>
                        <div class="divider"></div>
                        <p>
                            ถ้าอ้วนกำลังอ่านอยู่<br>
                            แสดงว่าอ้วนเปิดซองนี้แล้วนะ<br><br>
                            เค้าแค่อยากเขียนอะไรไว้ให้อ้วน<br>
                            ถึงจะเป็นข้อความสั้น ๆ<br>
                            แต่เค้าตั้งใจพิมพ์ทุกคำเลย<br><br>
                            เค้าอยากให้อ้วนยิ้มเยอะ ๆ<br>
                            กินข้าวให้ครบ พักผ่อนให้พอ<br>
                            แล้วก็อย่าหักโหมมากนะ<br><br>
                            เค้าเป็นห่วงอ้วนเสมอ 🤍<br><br>
                            แล้วก็…<br>
                            อย่าลืมรักเค้าเยอะ ๆ ด้วยนะ<br>
                            เพราะเค้าจะรักอ้วนเสมอ 🤍
                        </p>
                        <div class="signature">– แฟนที่รักเธอมากๆ –</div>
                    </div>
                </div>
            </div>
            
            <div class="open-btn">
                <span class="btn-text-open">🌸 กดตรงนี้เพื่อเปิดอ่านนะ 🌸</span>
                <span class="btn-text-close">🌸 กดเพื่อเก็บจดหมาย 🌸</span>
            </div>
        </label>
    </div>

    <script src="script.js"></script>
</body>
</html>
